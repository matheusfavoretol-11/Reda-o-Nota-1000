<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- DNS prefetch & preconnect for external assets as requested in Section 6 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="dns-prefetch" href="https://connect.facebook.net" />
    
    <!-- Parallel CSS and Font stylesheet preloading with non-blocking media="print" pattern to prevent layout block -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Bricolage+Grotesque:wght@400;700;800&display=swap" media="print" onload="this.media='all'" />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Bricolage+Grotesque:wght@400;700;800&display=swap" />
    </noscript>

    <!-- Highly-optimized, non-blocking early config prefetch -->
    <script>
      (function() {
        try {
          window.__SUPABASE_DYNAMIC_CONFIG_READY__ = fetch('/api/config/supabase')
            .then(function(res) { return res.json(); })
            .then(function(data) {
              if (data && data.url && data.key) {
                window.__SUPABASE_DYNAMIC_CONFIG__ = data;
              }
              return data;
            })
            .catch(function(err) {
              console.warn('Config dynamic prefetch warning:', err);
              return null;
            });
        } catch (e) {
          console.error(e);
        }
      })();
    </script>
    
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>RED 1000 PRO | Gabarite a Redação no ENEM</title>
    <meta name="description" content="A plataforma definitiva para alcançar a nota 1000 na redação no ENEM com IA e correções detalhadas.">
    
    <!-- Delayed Meta Pixel Loading to optimize PageSpeed and prevent Blocking First paint (Solution #4) -->
    <script>
      function loadPixel() {
        // Wait 3 seconds after site is completely responsive
        setTimeout(function() {
          (function(f,b,e,v,n,t,s){
            if(f.fbq)return;n=f.fbq=function(){n.callMethod?
            n.callMethod.apply(n,arguments):n.queue.push(arguments)};
            if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
            n.queue=[];t=b.createElement(e);t.async=!0;
            t.src=v;s=b.getElementsByTagName(e)[0];
            s.parentNode.insertBefore(t,s)
          })(window, document,'script','https://connect.facebook.net/en_US/fbevents.js');
          fbq('init', '1480419783413075');
          fbq('track', 'PageView');
        }, 3000);
      }

      if (document.readyState === 'complete') {
        loadPixel();
      } else {
        window.addEventListener('load', loadPixel);
      }
    </script>
    <!-- End Facebook Pixel Code -->
  </head>
  <body>
    <!-- Facebook Pixel Code (noscript) -->
    <noscript><img height="1" width="1" style="display:none" src="https://www.facebook.com/tr?id=1480419783413075&ev=PageView&noscript=1" /></noscript>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx" fetchpriority="high"></script>
  </body>
</html>
